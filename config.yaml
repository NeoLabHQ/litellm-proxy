model_list:
  # GLM models via ZAI
  - model_name: glm
    litellm_params:
      model: anthropic/glm-5
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/anthropic

  - model_name: glm-fast
    litellm_params:
      model: anthropic/glm-5-air
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/anthropic

  # Claude models via Claude Code OAuth (wildcard - all other Anthropic models)
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  drop_params: true
  turn_off_message_logging: true
  callbacks:
    - strip_oauth_callback.strip_oauth_for_zai
  model_group_settings:
    forward_client_headers_to_llm_api:
      - anthropic/*

general_settings:
  database_url: os.environ/DATABASE_URL
