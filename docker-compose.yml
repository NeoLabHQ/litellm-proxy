services:
  litellm:
    build: .
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./custom_auth.py:/app/custom_auth.py:ro
      - ./request_transformer.py:/app/request_transformer.py:ro
    restart: unless-stopped
